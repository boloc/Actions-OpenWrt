name: 编译 ImmortalWrt X86 (master分支)

on:
  # 手动触发
  workflow_dispatch:
  # 定时触发
  # schedule:
  #   - cron: '0 */72 * * *'
  # 通过外部事件[Source Code Update ImmortalWrt]触发构建ImmortalWrt脚本
  repository_dispatch:
    types: [Source Code Update ImmortalWrt]

# 避免同一分支重复排队，新的构建会自动取消旧的
concurrency:
  group: x86-master-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config.X86
  DIY_P1_SH: diy-x86-p1.sh
  DIY_P2_SH: diy-x86-p2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  NODEJS_SETUP_URL: https://deb.nodesource.com/setup_lts.x

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 检查服务器性能
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          sudo lshw -short -C memory 2>/dev/null | grep GiB || echo "lshw 不可用，跳过内存详情"
          echo
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      # 配置环境
      - name: 初始化编译环境
        env:
          # 非交互式安装
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) || true
          sudo docker image prune --all --force || true
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          # 执行 ImmortalWrt 官方构建环境初始化脚本
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          # 补充安装可能遗漏的依赖
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git libgnutls28-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev zlib1g-dev lld llvm lrzsz genisoimage msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            unzip vim wget xmlto xxd zstd libboost-system-dev upx-ucl libclang-dev mkisofs libncurses5-dev libncursesw5-dev
          sudo -E systemctl daemon-reload

          # 卸载老版本Node.js
          sudo -E apt-get -y remove nodejs npm || true
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean

          # 安装Node.js LTS版本（自动跟随官方LTS策略）
          curl -fsSL $NODEJS_SETUP_URL | sudo -E bash -
          sudo -E apt-get install -y nodejs
          hash -r
          node -v

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 创建模拟物理磁盘
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /workdir
          sudo mount /dev/github/runner /workdir
          sudo chown -R $USER:$GROUPS /workdir
          df -Th

      # clone源码并且创建软链
      - name: 克隆源码
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone --depth 1 --filter=blob:none $REPO_URL -b $REPO_BRANCH openwrt
          TOOLCHAIN_HASH=$(cd openwrt && git log --pretty=tformat:'%h' -n1 tools toolchain || echo none)
          echo "TOOLCHAIN_HASH=$TOOLCHAIN_HASH" >> $GITHUB_ENV
          echo "$TOOLCHAIN_HASH" > openwrt/.toolchain.hash
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      # 缓存，加快openwrt编译
      - name: 加载缓存
        uses: stupidloud/cachewrtbuild@main # https://github.com/stupidloud/cachewrtbuild
        with:
          ccache: 'true' # 检查是否缓存 ccache
          #清空缓存
          clean: "false" # 'false' 默认值
          mixkey: "X86-${{ env.REPO_BRANCH }}"
          prefix: ${{ github.workspace }}/openwrt

      - name: 加载自定义feeds
        run: |
          # 确认脚本文件存在
          ls -la $GITHUB_WORKSPACE/$DIY_P1_SH || { echo "Error: $DIY_P1_SH not found"; exit 1; }
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          cd openwrt && pwd
          bash $GITHUB_WORKSPACE/$DIY_P1_SH

      # 更新 feeds(安装两次包管理，预防第一次安装失败，有些漏掉)
      - name: 更新并安装feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a

      # 更新时区、编译时间
      - name: 更新时区和编译时间
        id: date
        run: |
          if [ ! -f "/usr/share/zoneinfo/$TZ" ]; then
            echo "Invalid timezone: $TZ"
            exit 1
          fi
          sudo ln -sf "/usr/share/zoneinfo/$TZ" /etc/localtime
          echo "$TZ" | sudo tee /etc/timezone
          echo "FILE_TIME=$(date +"%m-%d %H.%M")" >> $GITHUB_ENV
          echo "FILE_TIME1=$(date "+%Y年%m月%d日-%H点%M分")" >> $GITHUB_ENV
          echo "编译开始时间..."
          START_TIME=`date +'%Y-%m-%d %H:%M:%S'`
          echo "START_SECONDS=$(date --date="$START_TIME" +%s)" >> $GITHUB_ENV

      # 加载配置
      - name: 加载自定义配置
        run: |
          echo "写入配置文件..."
          # 确认脚本文件存在
          ls -la $GITHUB_WORKSPACE/$DIY_P2_SH || { echo "Error: $DIY_P2_SH not found"; exit 1; }
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          cd openwrt
          bash $GITHUB_WORKSPACE/$DIY_P2_SH

      # 下载包
      - name: 下载编译依赖
        id: package
        working-directory: ./openwrt
        env:
          KCONFIG_NOTIMESTAMP: "1"
        run: |
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      # 修复 Python3 编译问题
      - name: 修复 Python3 编译问题
        working-directory: ./openwrt
        run: |
          # 禁用 Python host 编译时的 profile-guided optimization (PGO) 测试
          # 这些测试在 GitHub Actions 容器环境中不稳定
          if [ -f "feeds/packages/lang/python/python3/Makefile" ]; then
            sed -i 's/--enable-optimizations/--disable-test-modules/g' feeds/packages/lang/python/python3/Makefile
            echo "已禁用 Python3 的优化测试"
          fi

      # 输出编译信息
      - name: 输出编译信息
        working-directory: ./openwrt
        run: |
          echo
          echo " 系统空间      类型   总数  已用  可用 使用率"
          df -hT $PWD
          echo
          echo "=========================================="
          echo
          echo "    CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
          echo "    CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c)"
          echo
          echo "=========================================="
          echo
          ZZZ="package/lean/default-settings/files/zzz-default-settings"
          if [ -f "$ZZZ" ]; then
            echo "    当前编译版本：$(cat $ZZZ|grep DISTRIB_REVISION= | sed 's/^.\{24\}//g' | sed 's/.\{26\}$//')"
          fi
          KERNEL_VER=$(grep 'KERNEL_PATCHVER:=' target/linux/*/Makefile 2>/dev/null | head -1 | cut -d'=' -f2 | tr -d ' ')
          if [ -n "$KERNEL_VER" ]; then
            echo "KERNEL_PATCHVER=$KERNEL_VER" >> $GITHUB_ENV
            echo "    内核版本：$KERNEL_VER"
          fi
          echo "    源码分支：${{ env.REPO_BRANCH }}"
          echo "    编译时间：${{ env.FILE_TIME1 }}"
          echo
          echo "=========================================="
          grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
          grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
          sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
          sed -i 's/CONFIG_PACKAGE_/、/g' Plug-in
          sed -i '/Transparent_Proxy/d' Plug-in > /dev/null 2>&1
          sed -i 's/=y/\ /g' Plug-in
          awk '$0=NR$0' Plug-in > Plug-2
          awk '{print "  " $0}' Plug-2 > Plug-in
          PLUGIN_LIST=$(cat Plug-in)
          echo "PLUGIN_LIST<<EOF" >> $GITHUB_ENV
          echo "$PLUGIN_LIST" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo
          echo "      已选插件列表"
          cat Plug-in
          rm -rf {Plug-in,Plug-2}
          echo
          echo "=========================================="

      # 编译固件
      - name: 编译固件
        id: compile
        working-directory: ./openwrt
        env:
          KCONFIG_NOTIMESTAMP: "1"
        run: |
          echo -e "使用 $(($(nproc) + 1)) 线程编译"
          # 第一次：快速编译（无详细日志），使用 yes "" 自动回答所有配置问题
          yes "" | make -j$(($(nproc) + 1)) || \
          # 失败后：单线程 + 详细日志
          yes "" | make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "编译完成时间..."
          START_SECONDS=${{ env.START_SECONDS }}
          END_TIME=`date +'%Y-%m-%d %H:%M:%S'`
          END_SECONDS=$(date --date="$END_TIME" +%s)
          SECONDS=$((END_SECONDS-START_SECONDS))
          HOUR=$(( $SECONDS/3600 )) && MIN=$(( ($SECONDS-${HOUR}*3600)/60 )) && SEC=$(( $SECONDS-${HOUR}*3600-${MIN}*60 ))
          echo "BUILD_TIME=${HOUR}时${MIN}分${SEC}秒" >> $GITHUB_ENV

      # 删除多余内容
      - name: 整理固件文件
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages *.buildinfo *.manifest *.bin sha256sums
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      # 上传固件到artifacts
      - name: 上传固件到Artifacts
        uses: actions/upload-artifact@v6
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      # 检查空间使用情况
      - name: 检查空间使用情况
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -hT
          echo "======================="
          du -h --max-depth=1 openwrt/ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 openwrt/build_dir
          du -h --max-depth=1 openwrt/bin

      # 创建版本releases
      - name: 生成Release标签
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=X86-master_$(date +"%Y%m%d%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          echo "★ 源码: ${{ env.REPO_URL }}" >> release.txt
          echo "★ 分支: ${{ env.REPO_BRANCH }}" >> release.txt
          echo "" >> release.txt
          echo "🖥 内核版本：${{ env.KERNEL_PATCHVER }}" >> release.txt
          echo "🎈 编译时间：${{ env.FILE_TIME1 }}" >> release.txt
          echo "⏰ 编译用时：${{ env.BUILD_TIME }}" >> release.txt
          echo "" >> release.txt
          echo "🔌 插件列表：" >> release.txt
          echo "${{ env.PLUGIN_LIST }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      # 上传固件到发布
      - name: 上传固件到Release
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.release_tag }}" \
            "${{ env.FIRMWARE }}"/* \
            --notes-file release.txt \
            --title "${{ steps.tag.outputs.release_tag }}"

      # 清理旧版本Releases（仅保留最新3个）
      - name: 清理旧版本Releases
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mapfile -t TAGS < <(gh release list --limit 100 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[].tagName')
          if [ "${#TAGS[@]}" -le 3 ]; then
            echo "Release数量为 ${#TAGS[@]}，无需清理"
            exit 0
          fi
          echo "当前Release数量: ${#TAGS[@]}，开始删除第4个及之后的旧版本..."
          for tag in "${TAGS[@]:3}"; do
            echo "删除旧Release: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
